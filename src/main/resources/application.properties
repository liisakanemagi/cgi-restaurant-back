# Application Configuration
spring.application.name=restaurant-reservation

# Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/restaurant_db
spring.datasource.username=postgres
spring.datasource.password=student123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Database Initialization
# Kasutame Hibernate'i (ddl-auto=update) ja L┼ME võlja Springi SQL-initialiseerimise,
# sest muidu v§ib create.sql/import.sql tekitada topelt-loomist.
spring.sql.init.mode=never
# Kui hiljem tahad XML/SQL init uuesti lubada, muuda see 'always' ja kasuta IF NOT EXISTS skripte.
spring.sql.init.schema-locations=classpath:database/create.sql
spring.sql.init.data-locations=classpath:database/import.sql

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Logimise tasemed ? lisame m§ned lisad, mis aitavad nõha, millised bean'id luuakse
logging.level.org.springframework.boot.autoconfigure.jdbc=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.beans.factory=DEBUG
logging.level.org.springframework.context=DEBUG